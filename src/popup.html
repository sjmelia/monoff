<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
    }

    h1 {
      margin: 0 0 15px 0;
      font-size: 16px;
      color: #333;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-switch {
      position: relative;
      width: 50px;
      height: 28px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 28px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: #4CAF50;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      background-color: white;
      text-align: center;
      font-size: 13px;
      color: #666;
    }

    .status.active {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <h1>Grayscale Mode</h1>

  <div class="toggle-container">
    <label class="toggle-switch">
      <input type="checkbox" id="grayscaleToggle">
      <span class="toggle-slider"></span>
    </label>
    <span id="statusText">Off</span>
  </div>

  <div class="status" id="statusBox">
    Grayscale is disabled
  </div>

  <script src="popup.js"></script>
</body>
</html>
