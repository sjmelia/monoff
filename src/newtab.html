<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New tab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --fg: #d8d8d8;
      --muted: #777;
      --line: #2a2a2a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.5 system-ui, sans-serif;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100vw - 48px));
    }

    .time {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 300;
      letter-spacing: -0.06em;
      margin-bottom: 24px;
    }

    form {
      border-bottom: 1px solid var(--line);
      margin-bottom: 32px;
    }

    input {
      width: 100%;
      background: transparent;
      color: var(--fg);
      border: 0;
      outline: 0;
      padding: 12px 0;
      font: inherit;
      font-size: 20px;
    }

    input::placeholder {
      color: var(--muted);
    }

    nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px 24px;
    }

    a {
      color: var(--fg);
      text-decoration: none;
      padding: 4px 0;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }

    .hint {
      margin-top: 32px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <div class="time" id="time"></div>

    <form id="search">
      <input id="q" autocomplete="off" autofocus placeholder="Search or enter URL" />
    </form>

    <nav>
      <a href="https://github.com">GitHub</a>
      <a href="https://mail.google.com">Gmail</a>
      <a href="https://todoist.com">Todoist</a>
      <a href="https://chatgpt.com">ChatGPT</a>
      <a href="https://calendar.google.com">Calendar</a>
      <a href="https://news.ycombinator.com">HN</a>
    </nav>

    <div class="hint">Enter searches the web. URLs open directly.</div>
  </main>

  <script>
    const time = document.getElementById("time");
    const form = document.getElementById("search");
    const q = document.getElementById("q");

    function updateTime() {
      time.textContent = new Intl.DateTimeFormat([], {
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date());
    }

    function looksLikeUrl(value) {
      return value.includes(".") || value.startsWith("localhost");
    }

    form.addEventListener("submit", event => {
      event.preventDefault();

      const value = q.value.trim();
      if (!value) return;

      if (looksLikeUrl(value)) {
        location.href = value.match(/^https?:\/\//)
          ? value
          : `https://${value}`;
      } else {
        location.href = `https://duckduckgo.com/?q=${encodeURIComponent(value)}`;
      }
    });

    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
