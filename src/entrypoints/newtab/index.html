<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New tab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --fg: #d8d8d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.5 system-ui, sans-serif;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100vw - 48px));
      text-align: center;
    }

    .time {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 300;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="time" id="time"></div>
  </main>

  <script type="module" src="./main.ts"></script>
</body>
</html>
