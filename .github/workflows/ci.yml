name: Browser extension

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      sign_unlisted:
        description: "Sign as unlisted Firefox extension"
        required: true
        type: boolean
        default: true

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      AMO_ADDON_URL: https://addons.mozilla.org/firefox/addon/monoff/

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Typecheck extension
        run: npm run lint

      - name: Build unpacked extensions
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate store screenshots
        run: npm run screenshots

      - name: Zip release packages
        run: npm run zip

      - name: Sign unlisted extension
        if: github.event_name == 'workflow_dispatch' && inputs.sign_unlisted
        run: |
          npx web-ext sign \
            --source-dir=dist/firefox-mv3 \
            --artifacts-dir=dist/artifacts \
            --channel=unlisted \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Submit listed Firefox extension
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npx web-ext sign \
            --source-dir=dist/firefox-mv3 \
            --artifacts-dir=dist/artifacts \
            --channel=listed \
            --amo-metadata=store/amo-metadata.json \
            --upload-source-code=dist/monoff-${GITHUB_REF_NAME#v}-sources.zip \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Released Monoff ${{ github.ref_name }}.

            Firefox Add-ons listing: ${{ env.AMO_ADDON_URL }}

            The Firefox listing may appear or update after Mozilla review completes.
          files: |
            dist/*.zip
            dist/screenshots/*.png
            dist/artifacts/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: browser-extension
          path: |
            dist/*.zip
            dist/screenshots/*.png
            dist/artifacts/*
          retention-days: 14
