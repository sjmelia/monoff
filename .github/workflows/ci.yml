name: Firefox extension

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      sign_unlisted:
        description: "Sign as unlisted Firefox extension"
        required: true
        type: boolean
        default: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Lint extension
        run: npm run lint

      - name: Build unsigned package
        run: npm run build

      - name: Sign unlisted extension
        if: github.event_name == 'workflow_dispatch' && inputs.sign_unlisted
        run: |
          npx web-ext sign \
            --source-dir=src \
            --artifacts-dir=artifacts \
            --channel=unlisted \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: artifacts/*
          retention-days: 14
