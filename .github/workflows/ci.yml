name: Package Firefox extension

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Lint extension
        run: npx web-ext lint --source-dir=extension

      - name: Build unsigned package
        run: npx web-ext build --source-dir=extension --artifacts-dir=artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension-unsigned
          path: artifacts/*.zip
          retention-days: 14

