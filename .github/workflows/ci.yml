name: Browser extension

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      sign_unlisted:
        description: "Sign as unlisted Firefox extension"
        required: true
        type: boolean
        default: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Typecheck extension
        run: npm run lint

      - name: Build unpacked extensions
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate store screenshots
        run: npm run screenshots

      - name: Zip release packages
        run: npm run zip

      - name: Sign unlisted extension
        if: github.event_name == 'workflow_dispatch' && inputs.sign_unlisted
        run: |
          npx web-ext sign \
            --source-dir=dist/firefox-mv3 \
            --artifacts-dir=dist/artifacts \
            --channel=unlisted \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: |
            dist/*.zip
            dist/screenshots/*.png
            dist/artifacts/*
          retention-days: 14
